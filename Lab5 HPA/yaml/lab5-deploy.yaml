apiVersion: v1
kind: Namespace
metadata:
  name: lab5
---
apiVersion: apps/v1                 # 使用 apps/v1 API（Deployment 屬於 apps 群組）
kind: Deployment                    # 資源種類：Deployment（用來管理 ReplicaSet 與滾動更新）
metadata:                           # 基本資訊
  name: lab5-{學號}-deploy          # Deployment 名稱（cluster 內唯一）
  namespace: lab5
spec:                               # Deployment 的規格設定
  replicas: 3                       # 希望維持 3 個 Pod（期望狀態）
  selector:                         # 用來選擇屬於這個 Deployment 的 Pod
    matchLabels:                    # 條件：標籤必須符合
      app: lab5-pod                 # 只管理 label 為 app=lab5-pod 的 Pod
  template:                         # Pod 範本（Deployment 會用這個建立新的 ReplicaSet）
    metadata:
      labels:
        app: lab5-pod        # 必須與 selector.matchLabels 一致
        version: v1                 # 自訂版本標籤（可用於版本區分、分流觀察）
    spec:
      containers:
      - name: lab5-pod       # 容器名稱（Pod 內識別用）
        image: {repo}:lab5  # 使用的 Docker Image（私有 registry）
        ports:
        - containerPort: 80         # 容器內監聽的 port（提供 HTTP 服務）
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        env:
        - name: POD_NAME
          valueFrom: { fieldRef: { fieldPath: metadata.name } }
        - name: POD_IP
          valueFrom: { fieldRef: { fieldPath: status.podIP } }
        - name: POD_NAMESPACE
          valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
        - name: NODE_NAME
          valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
        - name: NODE_IP
          valueFrom: { fieldRef: { fieldPath: status.hostIP } }
        - name: APP_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['version']
        - name: CPU_LIMIT_MILLICORES
          valueFrom:
            resourceFieldRef:
              containerName: lab5-pod
              resource: limits.cpu
              divisor: 1m

        - name: MEM_LIMIT_BYTES
          valueFrom:
            resourceFieldRef:
              containerName: lab5-pod
              resource: limits.memory
              divisor: 1

        - name: CPU_REQUEST_MILLICORES
          valueFrom:
            resourceFieldRef:
              containerName: lab5-pod
              resource: requests.cpu
              divisor: 1m

        - name: MEM_REQUEST_BYTES
          valueFrom:
            resourceFieldRef:
              containerName: lab5-pod
              resource: requests.memory
              divisor: 1

