apiVersion: v1            # 使用的 Kubernetes API 版本（Pod 屬於 core/v1）
kind: Pod                 # 資源種類，這裡建立的是一個 Pod
metadata:                 # 物件的基本資訊（名稱、標籤等）
  name: lab1-{學號}-pod   # 這個 Pod 的名稱（cluster 內唯一）
  labels:                 # 標籤（給 Service / Deployment / Selector 使用）
    app: web              # 自訂標籤，表示這是 web 類型
    version: v1           # 自訂標籤，表示版本 v1（可用於分流/滾動更新）
spec:                     # Pod 的詳細規格（真正執行的內容）
  containers:             # Pod 內包含的容器列表（Pod 可有多個 container）
  - name: lab1-container  # 容器名稱（Pod 內部識別用）
    image: {docker_repo}:lab1  # 要使用的 Docker Image（來自 docker hub repository）
    ports:
    - containerPort: 80   # 容器內部監聽的 port（給 K8s 做資訊標示用）
    env:
    - name: POD_NAME
      valueFrom: { fieldRef: { fieldPath: metadata.name } }
    - name: POD_IP
      valueFrom: { fieldRef: { fieldPath: status.podIP } }
    - name: POD_NAMESPACE
      valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
    - name: NODE_NAME
      valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
    - name: NODE_IP
      valueFrom: { fieldRef: { fieldPath: status.hostIP } }
    - name: APP_VERSION
      valueFrom:
        fieldRef:
          fieldPath: metadata.labels['version']

