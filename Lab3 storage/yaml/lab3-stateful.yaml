apiVersion: apps/v1                 # 使用 apps/v1 API（Deployment 屬於 apps 群組）
kind: StatefulSet                   # 資源種類 StatefulSet（用來管理 ReplicaSet 與資料）
metadata:                           # 基本資訊
  name: lab3-{學號}-stateful        # stateful 名稱（cluster 內唯一）
  namespace: lab3
spec:                               # stateful 的規格設定
  serviceName: lab3-headless          # StatefulSet 必須綁定一個 Headless Service
  replicas: 3                       # 希望維持 3 個 Pod（期望狀態）
  selector:                         # 用來選擇屬於這個 Deployment 的 Pod
    matchLabels:                    # 條件：標籤必須符合
      app: lab3-state-pod                 # 只管理 label 為 app=lab3-state-pod 的 Pod
  template:                         # Pod 範本（Deployment 會用這個建立新的 ReplicaSet）
    metadata:
      labels:
        app: lab3-state-pod         # 必須與 selector.matchLabels 一致
        version: v1                 # 自訂版本標籤（可用於版本區分、分流觀察）
    spec:
      containers:
      - name: lab3-pod              # 容器名稱（Pod 內識別用）
        image: {repo}:lab3  # 使用的 Docker Image（私有 registry）
        ports:
        - containerPort: 80         # 容器內監聽的 port（提供 HTTP 服務）
        env:
        - name: POD_NAME
          valueFrom: { fieldRef: { fieldPath: metadata.name } }
        - name: POD_IP
          valueFrom: { fieldRef: { fieldPath: status.podIP } }
        - name: POD_NAMESPACE
          valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
        - name: NODE_NAME
          valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
        - name: NODE_IP
          valueFrom: { fieldRef: { fieldPath: status.hostIP } }
        - name: APP_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['version']
        volumeMounts:
        - name: storage
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: storage
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: local-path
      resources:
        requests:
          storage: 200Mi

